version: "2"

linters:
  default: none
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - misspell
  settings:
    govet:
      enable-all: true
    errcheck:
      check-type-assertions: true
      check-blank: true

formatters:
  enable:
    - gofmt
    - goimports

run:
  timeout: 5m
